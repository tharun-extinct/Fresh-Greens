<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Produce — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
        </div>
    </nav>

    <div class="container page-section" style="max-width: 650px;">
        <h2 class="section-title"><i class="bi bi-plus-circle me-2"></i>Sell Fresh Produce</h2>
        <p class="text-muted mb-4">List your fresh fruits, vegetables, or organic produce for buyers near you.</p>

        <div class="settings-card">
            <form id="sellForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Product Title *</label>
                    <input type="text" class="form-control" id="title" placeholder="e.g., Organic Tomatoes" required maxlength="150">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea class="form-control" id="description" rows="3" placeholder="Describe your produce — freshness, source, etc."></textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Price (₹) *</label>
                        <input type="number" class="form-control" id="price" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Unit *</label>
                        <select class="form-select" id="unit" required>
                            <option value="kg">per Kg</option>
                            <option value="bunch">per Bunch</option>
                            <option value="piece">per Piece</option>
                            <option value="dozen">per Dozen</option>
                            <option value="pack">per Pack</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Stock Qty *</label>
                        <input type="number" class="form-control" id="stockQuantity" placeholder="0" min="1" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select class="form-select" id="categoryId">
                        <option value="">Select Category</option>
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">City *</label>
                        <input type="text" class="form-control" id="city" placeholder="Your city" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Pincode</label>
                        <input type="text" class="form-control" id="pincode" placeholder="e.g., 560001" maxlength="6">
                    </div>
                </div>

                <button type="submit" class="btn btn-fg btn-lg w-100">
                    <i class="bi bi-check-circle me-2"></i>List Product
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/api/config/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/location.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();
            FGLocation.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            // Pre-fill location
            const loc = FGLocation.get();
            if (loc) {
                $('#city').val(loc.city);
                $('#pincode').val(loc.pincode);
            }

            // Load categories
            FGApi.get('/api/categories').then(function (res) {
                if (res.success && res.data.length) {
                    res.data.forEach(function (cat) {
                        $('#categoryId').append(`<option value="${cat.id}">${cat.name}</option>`);
                    });
                }
            });

            // Submit
            $('#sellForm').on('submit', function (e) {
                e.preventDefault();
                const data = {
                    title: $('#title').val().trim(),
                    description: $('#description').val().trim(),
                    price: parseFloat($('#price').val()),
                    unit: $('#unit').val(),
                    stockQuantity: parseInt($('#stockQuantity').val()),
                    categoryId: $('#categoryId').val() ? parseInt($('#categoryId').val()) : null,
                    city: $('#city').val().trim(),
                    pincode: $('#pincode').val().trim()
                };

                FGApi.post('/api/products', data).then(function (res) {
                    if (res.success) {
                        FGToast.show('Product listed successfully! 🎉', 'success');
                        setTimeout(function () {
                            window.location.href = '/my-listings.html';
                        }, 1500);
                    }
                });
            });
        });
    </script>
</body>
</html>
