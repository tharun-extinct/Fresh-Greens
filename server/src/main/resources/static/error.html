<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
    <style>
        .error-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 80vh; text-align: center; padding: 2rem;
        }
        .error-code {
            font-size: 6rem; font-weight: 800; color: var(--fg-green); line-height: 1;
            text-shadow: 0 4px 16px rgba(34,139,34,0.12);
        }
        .error-msg { font-size: 1.25rem; color: var(--fg-dark); max-width: 400px; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
        </div>
    </nav>

    <div class="error-container">
        <div class="error-code" id="errorCode">404</div>
        <p class="error-msg" id="errorMsg">We couldn't find the page you were looking for. It may have been moved or removed.</p>
        <a href="/index.html" class="btn btn-fg mt-3"><i class="bi bi-house me-1"></i> Back to Home</a>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var code = params.get('code');
            if (code === '500') {
                document.getElementById('errorCode').textContent = '500';
                document.getElementById('errorMsg').textContent =
                    'Something went wrong on our end. Please try again later.';
            } else if (code === '403') {
                document.getElementById('errorCode').textContent = '403';
                document.getElementById('errorMsg').textContent =
                    'You don\'t have permission to access this resource.';
            }
        })();
    </script>
</body>
</html>
