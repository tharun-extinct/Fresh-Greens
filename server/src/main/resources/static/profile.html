<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
        </div>
    </nav>

    <div class="container page-section" style="max-width: 650px;">
        <!-- Profile Card -->
        <div class="settings-card text-center">
            <img src="" alt="" id="profilePhoto"
                 style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--fg-green-pale); object-fit: cover; margin-bottom: 1rem;"
                 onerror="this.style.display='none'">
            <h3 class="fw-bold" id="profileName">—</h3>
            <p class="text-muted mb-1" id="profileEmail">—</p>
            <span class="badge bg-success" id="profileRole">BUYER</span>
        </div>

        <!-- Quick Links -->
        <div class="settings-card">
            <h5><i class="bi bi-grid"></i> Quick Links</h5>
            <div class="list-group list-group-flush">
                <a href="/orders.html" class="list-group-item list-group-item-action d-flex justify-content-between">
                    <span><i class="bi bi-bag me-2"></i>My Orders</span>
                    <i class="bi bi-chevron-right"></i>
                </a>
                <a href="/my-listings.html" class="list-group-item list-group-item-action d-flex justify-content-between">
                    <span><i class="bi bi-shop me-2"></i>My Listings</span>
                    <i class="bi bi-chevron-right"></i>
                </a>
                <a href="/settings.html" class="list-group-item list-group-item-action d-flex justify-content-between">
                    <span><i class="bi bi-gear me-2"></i>Settings</span>
                    <i class="bi bi-chevron-right"></i>
                </a>
                <a href="/sell.html" class="list-group-item list-group-item-action d-flex justify-content-between">
                    <span><i class="bi bi-plus-circle me-2"></i>Sell Produce</span>
                    <i class="bi bi-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/api/config/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            FGApi.get('/api/users/me').then(function (res) {
                if (res.success) {
                    const u = res.data;
                    $('#profilePhoto').attr('src', u.photoUrl);
                    $('#profileName').text(u.displayName || 'User');
                    $('#profileEmail').text(u.email || '');
                    $('#profileRole').text(u.role);
                }
            });
        });
    </script>
</body>
</html>
