# ── CI / Test profile ────────────────────────────────────────────────────────
# Active via @ActiveProfiles("test") in AppApplicationTests.
# Overrides application.properties for test/CI execution.

# DB — URL fixed for CI MySQL container; password resolved from DB_PASSWORD env var
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis session/cache — not needed in unit tests
spring.session.store-type=none
spring.cache.type=none

# Firebase — FirebaseConfig skips init gracefully when file is empty
app.firebase.config-path=firebase-service-account.json

# Razorpay stubs — prevents real API calls during tests
razorpay.key.id=rzp_test_stub
razorpay.key.secret=stub_secret
razorpay.webhook.secret=stub_webhook_secret
