# ── CI / Test profile ────────────────────────────────────────────────────────────────────────
# Overrides application.properties for the 'test' Spring profile.
# Used by GitHub Actions and local unit tests.

# Datasource — CI uses the MySQL service container via env vars
spring.datasource.url=jdbc:mysql://localhost:3306/fresh_greens_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis session/cache — not needed in unit tests
spring.session.store-type=none
spring.cache.type=none

# Point to the (empty) Firebase JSON — FirebaseConfig will skip init gracefully
app.firebase.config-path=firebase-service-account.json

# Stub Razorpay keys — prevents RazorpayClient init failure in tests
razorpay.key.id=rzp_test_stub
razorpay.key.secret=stub_secret
razorpay.webhook.secret=stub_webhook_secret
