# Fresh Greens e-Market — Application Configuration
spring.application.name=fresh-greens


# Server Configuration — Cloud Run injects PORT env var; fallback to 8080 locally
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/
# server.error.whitelabel.enabled=false

# MySQL Datasource — credentials loaded from .env (local) or environment variables (CI/prod)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fresh_greens_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL — auto-creates and updates tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Connection pool (HikariCP — default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000


# Redis Cache + Session Store (Stateful auth)
# To use Redis: set spring.cache.type=redis, spring.session.store-type=redis,
# and ensure Redis is running on localhost:6379
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms

# Session store — 'none' = in-memory HttpSession, 'redis' = Redis-backed
spring.session.store-type=none
server.servlet.session.timeout=30m

# Cache — 'simple' = in-memory ConcurrentHashMap, 'redis' = Redis-backed
spring.cache.type=simple

# Disable Redis auto-config & health indicator when not using Redis.
# Re-enable these when a Redis instance is provisioned in production.
spring.autoconfigure.exclude=${REDIS_AUTOCONFIG_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration}
management.health.redis.enabled=false

# --------------------------------------------------------------------
# Firebase Configuration `src/main/resources/`
# APP_FIREBASE_CONFIG_PATH overrides to filesystem path on Cloud Run (mounted secret)
app.firebase.config-path=${APP_FIREBASE_CONFIG_PATH:firebase-service-account.json}

# Firebase Web SDK public config (served via /assets/js/firebase-config.js)
app.firebase.web.api-key=${FIREBASE_WEB_API_KEY:}
app.firebase.web.auth-domain=${FIREBASE_WEB_AUTH_DOMAIN:}
app.firebase.web.project-id=${FIREBASE_WEB_PROJECT_ID:}
app.firebase.web.storage-bucket=${FIREBASE_WEB_STORAGE_BUCKET:}
app.firebase.web.messaging-sender-id=${FIREBASE_WEB_MESSAGING_SENDER_ID:}
app.firebase.web.app-id=${FIREBASE_WEB_APP_ID:}
app.firebase.web.measurement-id=${FIREBASE_WEB_MEASUREMENT_ID:}


# Razorpay Payment Gateway — loaded from .env (local) or environment variables (CI/prod)
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
# Webhook secret is optional — only needed when Razorpay webhooks are enabled in Razorpay Dashboard
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# Twilio Verify (SMS OTP) — loaded from .env (local) or environment variables (CI/prod)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID:}


# File Upload (Product Images — Local Disk)
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB


# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0


# Actuator (Health + Info endpoints only)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# CORS — additional allowed origins (comma-separated). Cloud Run URL injected via env var.
app.cors.allowed-origins=${APP_CORS_ORIGINS:}

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.root=INFO
logging.level.com.freshgreens=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
