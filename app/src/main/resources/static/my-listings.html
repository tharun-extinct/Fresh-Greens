<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
            <a href="/sell.html" class="btn btn-accent btn-sm"><i class="bi bi-plus-circle me-1"></i> New Listing</a>
        </div>
    </nav>

    <div class="container page-section">
        <h2 class="section-title"><i class="bi bi-shop me-2"></i>My Listings</h2>

        <div class="row g-3" id="listingsGrid">
            <div class="spinner-fg"><div class="spinner-border text-success"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            FGApi.get('/api/products/my-listings').then(function (res) {
                if (res.success) {
                    const products = res.data;
                    if (!products.length) {
                        $('#listingsGrid').html(`
                            <div class="empty-state">
                                <i class="bi bi-shop d-block"></i>
                                <h5>No listings yet</h5>
                                <p>Start selling fresh produce to your community!</p>
                                <a href="/sell.html" class="btn btn-fg mt-2">Create Listing</a>
                            </div>`);
                        return;
                    }

                    let html = '';
                    products.forEach(function (p) {
                        const statusBadge = p.status === 'ACTIVE'
                            ? '<span class="badge bg-success">Active</span>'
                            : p.status === 'SOLD_OUT'
                            ? '<span class="badge bg-warning">Sold Out</span>'
                            : '<span class="badge bg-secondary">' + p.status + '</span>';

                        html += `<div class="col-6 col-md-4 col-lg-3">
                            <div class="product-card">
                                <img src="${p.imageUrl || '/assets/images/products/default.jpg'}" class="card-img-top" alt="${p.title}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-start mb-1">
                                        <div class="product-title">${p.title}</div>
                                        ${statusBadge}
                                    </div>
                                    <div class="product-price">₹${p.price} <span class="product-unit">/ ${p.unit}</span></div>
                                    <div class="text-muted mt-1" style="font-size: 0.8rem;">Stock: ${p.stockQuantity}</div>
                                </div>
                            </div>
                        </div>`;
                    });
                    $('#listingsGrid').html(html);
                }
            });
        });
    </script>
</body>
</html>
