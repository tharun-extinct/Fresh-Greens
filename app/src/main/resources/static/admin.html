<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
    <style>
        .stat-card {
            background: #fff;
            border-radius: var(--fg-radius);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--fg-shadow);
            border-left: 4px solid var(--fg-green);
            transition: box-shadow 0.2s;
        }
        .stat-card:hover { box-shadow: var(--fg-shadow-hover); }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--fg-green);
            line-height: 1.1;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--fg-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .stat-card .stat-sub {
            font-size: 0.78rem;
            color: var(--fg-text-muted);
            margin-top: 0.2rem;
        }
        .stat-card.stat-orange { border-left-color: var(--fg-accent); }
        .stat-card.stat-orange .stat-value { color: var(--fg-accent); }
        .stat-card.stat-blue { border-left-color: #0077b6; }
        .stat-card.stat-blue .stat-value { color: #0077b6; }
        .stat-card.stat-purple { border-left-color: #7209b7; }
        .stat-card.stat-purple .stat-value { color: #7209b7; }

        .admin-tabs .nav-link {
            color: var(--fg-text-muted);
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: var(--fg-radius-sm) var(--fg-radius-sm) 0 0;
        }
        .admin-tabs .nav-link.active {
            color: var(--fg-green);
            border-color: var(--fg-border) var(--fg-border) #fff;
        }
        .admin-tabs .nav-link:hover { color: var(--fg-green); }

        .tab-content { background: #fff; border: 1px solid var(--fg-border); border-top: none; border-radius: 0 0 var(--fg-radius) var(--fg-radius); padding: 1.25rem; }

        .table th { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
        .table td { font-size: 0.88rem; vertical-align: middle; }

        .admin-badge { font-size: 0.7rem; padding: 0.25em 0.6em; border-radius: 20px; font-weight: 600; }

        .pagination-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--fg-border); }
        .page-info { font-size: 0.82rem; color: var(--fg-text-muted); }

        .admin-header { background: linear-gradient(135deg, var(--fg-green-dark) 0%, var(--fg-green) 100%); color: #fff; padding: 1.5rem 0 1rem; margin-bottom: 1.5rem; }
        .admin-header h1 { font-size: 1.6rem; font-weight: 800; margin: 0; }
        .admin-header .admin-badge-role { background: rgba(255,255,255,0.2); color: #fff; font-size: 0.72rem; padding: 0.2em 0.7em; border-radius: 20px; vertical-align: middle; margin-left: 0.5rem; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a href="/index.html" class="text-white-50 text-decoration-none" style="font-size:0.85rem;">
                    <i class="bi bi-arrow-left me-1"></i>Back to Site
                </a>
                <button class="btn btn-sm btn-outline-light" id="logoutBtn">
                    <i class="bi bi-box-arrow-right me-1"></i>Sign Out
                </button>
            </div>
        </div>
    </nav>

    <!-- Admin Header -->
    <div class="admin-header">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <h1>🛠️ Admin Dashboard <span class="admin-badge-role">ADMIN</span></h1>
                    <p class="mb-0 mt-1" style="opacity:0.8; font-size:0.85rem;" id="adminGreeting">Loading...</p>
                </div>
                <div class="text-end d-none d-md-block">
                    <small style="opacity:0.7; font-size:0.78rem;">Last refreshed: <span id="lastRefreshed">—</span></small>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4 pb-5">

        <!-- Stats Cards -->
        <div class="row g-3 mb-4" id="statsRow">
            <div class="col-6 col-lg-3">
                <div class="stat-card">
                    <div class="stat-label"><i class="bi bi-people me-1"></i>Total Users</div>
                    <div class="stat-value" id="statUsers"><span class="spinner-border spinner-border-sm text-success"></span></div>
                    <div class="stat-sub" id="statSellers">— sellers</div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card stat-orange">
                    <div class="stat-label"><i class="bi bi-bag me-1"></i>Products</div>
                    <div class="stat-value" id="statProducts">—</div>
                    <div class="stat-sub" id="statActiveProducts">— active</div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card stat-blue">
                    <div class="stat-label"><i class="bi bi-box-seam me-1"></i>Orders</div>
                    <div class="stat-value" id="statOrders">—</div>
                    <div class="stat-sub" id="statPendingOrders">— pending payment</div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="stat-card stat-purple">
                    <div class="stat-label"><i class="bi bi-currency-rupee me-1"></i>Revenue</div>
                    <div class="stat-value" id="statRevenue">—</div>
                    <div class="stat-sub">Total paid orders</div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs admin-tabs" id="adminTabs" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="users-tab" data-bs-toggle="tab" href="#usersPane" role="tab">
                    <i class="bi bi-people me-1"></i>Users
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="products-tab" data-bs-toggle="tab" href="#productsPane" role="tab">
                    <i class="bi bi-bag me-1"></i>Products
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="orders-tab" data-bs-toggle="tab" href="#ordersPane" role="tab">
                    <i class="bi bi-box-seam me-1"></i>Orders
                </a>
            </li>
        </ul>

        <div class="tab-content" id="adminTabContent">

            <!-- ── Users Tab ── -->
            <div class="tab-pane fade show active" id="usersPane" role="tabpanel">
                <div id="usersContent">
                    <div class="spinner-fg"><div class="spinner-border text-success"></div></div>
                </div>
                <div class="pagination-bar">
                    <button class="btn btn-outline-secondary btn-sm" id="usersPrev" disabled>
                        <i class="bi bi-chevron-left"></i> Previous
                    </button>
                    <span class="page-info" id="usersPageInfo"></span>
                    <button class="btn btn-outline-secondary btn-sm" id="usersNext" disabled>
                        Next <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- ── Products Tab ── -->
            <div class="tab-pane fade" id="productsPane" role="tabpanel">
                <div id="productsContent">
                    <div class="text-center text-muted py-4" style="font-size:0.9rem;">
                        <i class="bi bi-arrow-up-circle me-1"></i>Click the Products tab to load
                    </div>
                </div>
                <div class="pagination-bar">
                    <button class="btn btn-outline-secondary btn-sm" id="productsPrev" disabled>
                        <i class="bi bi-chevron-left"></i> Previous
                    </button>
                    <span class="page-info" id="productsPageInfo"></span>
                    <button class="btn btn-outline-secondary btn-sm" id="productsNext" disabled>
                        Next <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>

            <!-- ── Orders Tab ── -->
            <div class="tab-pane fade" id="ordersPane" role="tabpanel">
                <div id="ordersContent">
                    <div class="text-center text-muted py-4" style="font-size:0.9rem;">
                        <i class="bi bi-arrow-up-circle me-1"></i>Click the Orders tab to load
                    </div>
                </div>
                <div class="pagination-bar">
                    <button class="btn btn-outline-secondary btn-sm" id="ordersPrev" disabled>
                        <i class="bi bi-chevron-left"></i> Previous
                    </button>
                    <span class="page-info" id="ordersPageInfo"></span>
                    <button class="btn btn-outline-secondary btn-sm" id="ordersNext" disabled>
                        Next <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase + jQuery + Bootstrap -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            // Page state — track current page per tab (-1 = not yet loaded)
            const state = {
                users:    { page: 0, totalPages: 0, loaded: false },
                products: { page: 0, totalPages: 0, loaded: false },
                orders:   { page: 0, totalPages: 0, loaded: false }
            };

            // ── Verify admin role via fresh API call ──────────────────────────
            FGApi.get('/api/users/me').then(function (res) {
                if (!res.success || res.data.role !== 'ADMIN') {
                    FGToast.show('Access denied. Admins only.', 'danger');
                    setTimeout(function () { window.location.href = '/index.html'; }, 1500);
                    return;
                }
                const name = res.data.displayName || res.data.email || 'Admin';
                $('#adminGreeting').text('Welcome back, ' + name);
                $('#lastRefreshed').text(new Date().toLocaleTimeString());
                _loadStats();
                _loadUsers(0);
            });

            // Lazy-load tabs on first show
            $('a[data-bs-toggle="tab"]').on('shown.bs.tab', function (e) {
                const target = $(e.target).attr('href');
                if (target === '#productsPane' && !state.products.loaded) _loadProducts(0);
                if (target === '#ordersPane'   && !state.orders.loaded)   _loadOrders(0);
            });

            // ── Stats ─────────────────────────────────────────────────────────
            function _loadStats() {
                FGApi.get('/api/admin/stats').then(function (res) {
                    if (!res.success) return;
                    const s = res.data;
                    $('#statUsers').text(s.totalUsers.toLocaleString());
                    $('#statSellers').text(s.totalSellers.toLocaleString() + ' sellers');
                    $('#statProducts').text(s.totalProducts.toLocaleString());
                    $('#statActiveProducts').text(s.activeProducts.toLocaleString() + ' active');
                    $('#statOrders').text(s.totalOrders.toLocaleString());
                    $('#statPendingOrders').text(s.pendingOrders.toLocaleString() + ' pending payment');
                    $('#statRevenue').text('₹' + Number(s.totalRevenue).toLocaleString('en-IN', { maximumFractionDigits: 0 }));
                });
            }

            // ── Users ─────────────────────────────────────────────────────────
            function _loadUsers(page) {
                state.users.page = page;
                state.users.loaded = true;
                $('#usersContent').html('<div class="spinner-fg"><div class="spinner-border text-success"></div></div>');
                FGApi.get('/api/admin/users?page=' + page + '&size=15').then(function (res) {
                    if (!res.success) return;
                    const p = res.data;
                    state.users.totalPages = p.totalPages;
                    _renderUsers(p.content);
                    _updatePagination('users', page, p.totalPages, p.totalElements);
                });
            }

            function _renderUsers(users) {
                if (!users || users.length === 0) {
                    $('#usersContent').html('<div class="empty-state"><i class="bi bi-people d-block"></i><p>No users found.</p></div>');
                    return;
                }
                let html = `
                    <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Name</th><th>Email</th><th>Phone</th>
                                <th>Role</th><th>Status</th><th>Verified</th><th>Joined</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>`;
                users.forEach(function (u) {
                    const activeBadge = u.active
                        ? '<span class="badge bg-success admin-badge">Active</span>'
                        : '<span class="badge bg-danger admin-badge">Inactive</span>';
                    const verifiedIcons =
                        (u.phoneVerified  ? '<i class="bi bi-phone-fill text-success me-1" title="Phone verified"></i>'  : '<i class="bi bi-phone text-muted me-1" title="Phone not verified"></i>') +
                        (u.emailVerified  ? '<i class="bi bi-envelope-fill text-success" title="Email verified"></i>'    : '<i class="bi bi-envelope text-muted" title="Email not verified"></i>');
                    html += `
                        <tr>
                            <td><small class="text-muted">#${u.id}</small></td>
                            <td><strong>${u.displayName || '—'}</strong></td>
                            <td><small>${u.email || '—'}</small></td>
                            <td><small>${u.phone || '—'}</small></td>
                            <td>${_roleBadge(u.role)}</td>
                            <td>${activeBadge}</td>
                            <td>${verifiedIcons}</td>
                            <td><small>${u.createdAt || '—'}</small></td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <select class="form-select form-select-sm role-select" style="width:105px;" data-id="${u.id}">
                                        <option value="BUYER"  ${u.role === 'BUYER'  ? 'selected' : ''}>Buyer</option>
                                        <option value="SELLER" ${u.role === 'SELLER' ? 'selected' : ''}>Seller</option>
                                        <option value="ADMIN"  ${u.role === 'ADMIN'  ? 'selected' : ''}>Admin</option>
                                    </select>
                                    <button class="btn btn-sm ${u.active ? 'btn-outline-danger' : 'btn-outline-success'} toggle-user-btn"
                                        data-id="${u.id}" data-active="${!u.active}"
                                        title="${u.active ? 'Deactivate user' : 'Activate user'}">
                                        <i class="bi bi-${u.active ? 'person-x' : 'person-check'}"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                });
                html += '</tbody></table></div>';
                $('#usersContent').html(html);

                // Role change
                $(document).off('change', '.role-select').on('change', '.role-select', function () {
                    const id = $(this).data('id');
                    const role = $(this).val();
                    FGApi.put('/api/admin/users/' + id + '/role', { role: role }).then(function (r) {
                        if (r.success) { FGToast.show('Role updated to ' + role, 'success'); _loadStats(); }
                    });
                });

                // Toggle active
                $(document).off('click', '.toggle-user-btn').on('click', '.toggle-user-btn', function () {
                    const id = $(this).data('id');
                    const active = $(this).data('active') === true || $(this).data('active') === 'true';
                    FGApi.put('/api/admin/users/' + id + '/status', { active: active }).then(function (r) {
                        if (r.success) { FGToast.show('User ' + (active ? 'activated' : 'deactivated'), 'success'); _loadUsers(state.users.page); }
                    });
                });
            }

            // ── Products ──────────────────────────────────────────────────────
            function _loadProducts(page) {
                state.products.page = page;
                state.products.loaded = true;
                $('#productsContent').html('<div class="spinner-fg"><div class="spinner-border text-success"></div></div>');
                FGApi.get('/api/admin/products?page=' + page + '&size=15').then(function (res) {
                    if (!res.success) return;
                    const p = res.data;
                    state.products.totalPages = p.totalPages;
                    _renderProducts(p.content);
                    _updatePagination('products', page, p.totalPages, p.totalElements);
                });
            }

            function _renderProducts(products) {
                if (!products || products.length === 0) {
                    $('#productsContent').html('<div class="empty-state"><i class="bi bi-bag-x d-block"></i><p>No products found.</p></div>');
                    return;
                }
                let html = `
                    <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>Title</th><th>Seller</th><th>Price</th>
                                <th>City</th><th>Category</th><th>Stock</th><th>Status</th><th>Created</th><th>Action</th>
                            </tr>
                        </thead>
                        <tbody>`;
                products.forEach(function (p) {
                    html += `
                        <tr>
                            <td><small class="text-muted">#${p.id}</small></td>
                            <td><strong>${p.title}</strong></td>
                            <td><small>${p.sellerName || '—'}</small></td>
                            <td class="fw-bold text-success">₹${p.price}</td>
                            <td><small>${p.city || '—'}</small></td>
                            <td><small>${p.categoryName || '—'}</small></td>
                            <td>${p.stockQuantity}</td>
                            <td>${_productStatusBadge(p.status)}</td>
                            <td><small>${p.createdAt || '—'}</small></td>
                            <td>
                                <select class="form-select form-select-sm product-status-select" style="width:120px;" data-id="${p.id}">
                                    <option value="ACTIVE"   ${p.status === 'ACTIVE'   ? 'selected' : ''}>Active</option>
                                    <option value="SOLD_OUT" ${p.status === 'SOLD_OUT' ? 'selected' : ''}>Sold Out</option>
                                    <option value="EXPIRED"  ${p.status === 'EXPIRED'  ? 'selected' : ''}>Expired</option>
                                    <option value="REMOVED"  ${p.status === 'REMOVED'  ? 'selected' : ''}>Removed</option>
                                </select>
                            </td>
                        </tr>`;
                });
                html += '</tbody></table></div>';
                $('#productsContent').html(html);

                $(document).off('change', '.product-status-select').on('change', '.product-status-select', function () {
                    const id = $(this).data('id');
                    const status = $(this).val();
                    FGApi.put('/api/admin/products/' + id + '/status', { status: status }).then(function (r) {
                        if (r.success) { FGToast.show('Product set to ' + status.replace('_', ' '), 'success'); _loadStats(); }
                    });
                });
            }

            // ── Orders ────────────────────────────────────────────────────────
            function _loadOrders(page) {
                state.orders.page = page;
                state.orders.loaded = true;
                $('#ordersContent').html('<div class="spinner-fg"><div class="spinner-border text-success"></div></div>');
                FGApi.get('/api/admin/orders?page=' + page + '&size=15').then(function (res) {
                    if (!res.success) return;
                    const p = res.data;
                    state.orders.totalPages = p.totalPages;
                    _renderOrders(p.content);
                    _updatePagination('orders', page, p.totalPages, p.totalElements);
                });
            }

            function _renderOrders(orders) {
                if (!orders || orders.length === 0) {
                    $('#ordersContent').html('<div class="empty-state"><i class="bi bi-bag-x d-block"></i><p>No orders yet.</p></div>');
                    return;
                }
                let html = `
                    <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Order #</th><th>Buyer</th><th>Total</th>
                                <th>Payment</th><th>Status</th><th>City</th><th>Date</th><th>Update Status</th>
                            </tr>
                        </thead>
                        <tbody>`;
                orders.forEach(function (o) {
                    html += `
                        <tr>
                            <td><strong>${o.orderNumber}</strong></td>
                            <td>
                                <div class="fw-semibold">${o.buyerName || '—'}</div>
                                <small class="text-muted">${o.buyerEmail || ''}</small>
                            </td>
                            <td class="fw-bold text-success">₹${o.grandTotal}</td>
                            <td>${_paymentBadge(o.paymentStatus)}</td>
                            <td>${_orderStatusBadge(o.orderStatus)}</td>
                            <td><small>${o.city || '—'}</small></td>
                            <td><small>${o.createdAt || '—'}</small></td>
                            <td>
                                <select class="form-select form-select-sm order-status-select" style="width:130px;" data-id="${o.orderId}">
                                    <option value="CREATED"   ${o.orderStatus === 'CREATED'   ? 'selected' : ''}>Created</option>
                                    <option value="CONFIRMED" ${o.orderStatus === 'CONFIRMED' ? 'selected' : ''}>Confirmed</option>
                                    <option value="PACKED"    ${o.orderStatus === 'PACKED'    ? 'selected' : ''}>Packed</option>
                                    <option value="SHIPPED"   ${o.orderStatus === 'SHIPPED'   ? 'selected' : ''}>Shipped</option>
                                    <option value="DELIVERED" ${o.orderStatus === 'DELIVERED' ? 'selected' : ''}>Delivered</option>
                                    <option value="CANCELLED" ${o.orderStatus === 'CANCELLED' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                        </tr>`;
                });
                html += '</tbody></table></div>';
                $('#ordersContent').html(html);

                $(document).off('change', '.order-status-select').on('change', '.order-status-select', function () {
                    const id = $(this).data('id');
                    const status = $(this).val();
                    FGApi.put('/api/admin/orders/' + id + '/status', { status: status }).then(function (r) {
                        if (r.success) FGToast.show('Order status updated to ' + status, 'success');
                    });
                });
            }

            // ── Pagination helpers ────────────────────────────────────────────
            function _updatePagination(tab, page, totalPages, total) {
                $('#' + tab + 'PageInfo').text(
                    'Page ' + (page + 1) + ' of ' + (totalPages || 1) + ' — ' + total + ' total'
                );
                $('#' + tab + 'Prev').prop('disabled', page === 0);
                $('#' + tab + 'Next').prop('disabled', page >= totalPages - 1);
            }

            $('#usersPrev').on('click',    function () { if (state.users.page    > 0) _loadUsers(state.users.page       - 1); });
            $('#usersNext').on('click',    function () { if (state.users.page    < state.users.totalPages    - 1) _loadUsers(state.users.page       + 1); });
            $('#productsPrev').on('click', function () { if (state.products.page > 0) _loadProducts(state.products.page - 1); });
            $('#productsNext').on('click', function () { if (state.products.page < state.products.totalPages - 1) _loadProducts(state.products.page + 1); });
            $('#ordersPrev').on('click',   function () { if (state.orders.page   > 0) _loadOrders(state.orders.page    - 1); });
            $('#ordersNext').on('click',   function () { if (state.orders.page   < state.orders.totalPages   - 1) _loadOrders(state.orders.page    + 1); });

            // ── Badge helpers ─────────────────────────────────────────────────
            function _roleBadge(role) {
                const map = { ADMIN: 'danger', SELLER: 'warning text-dark', BUYER: 'info text-dark' };
                return '<span class="badge bg-' + (map[role] || 'secondary') + ' admin-badge">' + role + '</span>';
            }
            function _productStatusBadge(s) {
                const map = { ACTIVE: 'success', SOLD_OUT: 'warning text-dark', EXPIRED: 'secondary', REMOVED: 'danger' };
                return '<span class="badge bg-' + (map[s] || 'secondary') + ' admin-badge">' + s.replace('_', ' ') + '</span>';
            }
            function _paymentBadge(s) {
                const map = { PAID: 'success', PENDING: 'warning text-dark', FAILED: 'danger', REFUNDED: 'info text-dark' };
                return '<span class="badge bg-' + (map[s] || 'secondary') + ' admin-badge">' + s + '</span>';
            }
            function _orderStatusBadge(s) {
                const map = {
                    CREATED: 'secondary', CONFIRMED: 'info text-dark', PACKED: 'primary',
                    SHIPPED: 'warning text-dark', DELIVERED: 'success', CANCELLED: 'danger'
                };
                return '<span class="badge bg-' + (map[s] || 'secondary') + ' admin-badge">' + s + '</span>';
            }

            // ── Logout ────────────────────────────────────────────────────────
            $('#logoutBtn').on('click', function () {
                FGAuth.signOut().then(function () {
                    window.location.href = '/login.html';
                });
            });
        });
    </script>
</body>
</html>
