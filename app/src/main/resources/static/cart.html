<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
        </div>
    </nav>

    <div class="container page-section">
        <h2 class="section-title"><i class="bi bi-cart3 me-2"></i>Your Cart</h2>

        <div class="row g-4">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="bg-white rounded-3 shadow-sm" id="cartItems">
                    <div class="spinner-fg"><div class="spinner-border text-success"></div></div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="settings-card sticky-top" style="top: 80px;">
                    <h5><i class="bi bi-receipt"></i> Order Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal (<span id="itemCount">0</span> items)</span>
                        <span class="fw-bold" id="subtotal">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Delivery</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold" style="font-size: 1.3rem; color: var(--fg-green);" id="total">₹0</span>
                    </div>

                    <!-- Phone verification warning (hidden by default) -->
                    <div id="phoneWarning" class="d-none mb-3">
                        <div class="alert alert-warning mb-2 p-2" style="font-size: 0.82rem;">
                            <i class="bi bi-phone-vibrate me-1"></i>
                            <strong>Phone verification required!</strong><br>
                            <a href="/settings.html" class="alert-link">Verify your phone in Settings →</a>
                        </div>
                        <button class="btn btn-secondary w-100" disabled>
                            <i class="bi bi-lock me-1"></i> Phone Verification Required
                        </button>
                    </div>

                    <!-- Normal checkout button (hidden if phone not verified) -->
                    <a href="/checkout.html" class="btn btn-fg w-100" id="checkoutBtn">
                        <i class="bi bi-lock me-1"></i> Proceed to Checkout
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/api/config/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            // Check phone verification status — gate checkout if not verified
            FGApi.get('/api/users/me').then(function (userRes) {
                if (userRes.success && !userRes.data.phoneVerified) {
                    $('#phoneWarning').removeClass('d-none');
                    $('#checkoutBtn').addClass('d-none');
                }
            });

            _loadCart();

            function _loadCart() {
                FGApi.get('/api/cart').then(function (res) {
                    if (res.success) {
                        _renderCart(res.data);
                    }
                });
            }

            function _renderCart(cart) {
                if (!cart.items || cart.items.length === 0) {
                    $('#cartItems').html(`
                        <div class="empty-state">
                            <i class="bi bi-cart-x d-block"></i>
                            <h5>Your cart is empty</h5>
                            <p>Browse our marketplace to find fresh produce!</p>
                            <a href="/index.html" class="btn btn-fg mt-2">Start Shopping</a>
                        </div>`);
                    $('#checkoutBtn').addClass('disabled');
                    return;
                }

                let html = '';
                cart.items.forEach(function (item) {
                    html += `
                        <div class="cart-item" data-product-id="${item.productId}">
                            <img src="${item.imageUrl || '/assets/images/products/default.jpg'}" alt="${item.productTitle}">
                            <div class="flex-grow-1">
                                <a href="/product-detail.html?id=${item.productId}" class="fw-bold" style="color: var(--fg-text);">${item.productTitle}</a>
                                <div class="text-muted" style="font-size: 0.8rem;">₹${item.unitPrice} / ${item.unit} · Seller: ${item.sellerName}</div>
                                <div class="quantity-controls mt-2">
                                    <button class="qty-btn" data-action="decrease" data-id="${item.productId}"><i class="bi bi-dash"></i></button>
                                    <span class="fw-bold px-2">${item.quantity}</span>
                                    <button class="qty-btn" data-action="increase" data-id="${item.productId}"><i class="bi bi-plus"></i></button>
                                </div>
                            </div>
                            <div class="text-end">
                                <div class="fw-bold" style="color: var(--fg-green);">₹${item.totalPrice}</div>
                                <button class="btn btn-sm btn-link text-danger remove-btn" data-id="${item.productId}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>`;
                });
                $('#cartItems').html(html);
                $('#itemCount').text(cart.totalItems);
                $('#subtotal').text('₹' + cart.totalAmount);
                $('#total').text('₹' + cart.totalAmount);
            }

            // Quantity controls
            $(document).on('click', '.qty-btn', function () {
                const productId = $(this).data('id');
                const action = $(this).data('action');
                const $item = $(this).closest('.cart-item');
                const currentQty = parseInt($item.find('.fw-bold.px-2').text());
                const newQty = action === 'increase' ? currentQty + 1 : currentQty - 1;

                FGApi.put('/api/cart/items/' + productId + '?quantity=' + newQty)
                    .then(function (res) {
                        if (res.success) _renderCart(res.data);
                    });
            });

            // Remove item
            $(document).on('click', '.remove-btn', function () {
                const productId = $(this).data('id');
                FGApi.del('/api/cart/items/' + productId)
                    .then(function () { _loadCart(); });
            });
        });
    </script>
</body>
</html>
