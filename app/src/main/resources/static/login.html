<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fresh Greens</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Brand -->
            <div class="brand-logo">🥬</div>
            <h1>Fresh Greens</h1>
            <p>Your local farm-to-table marketplace.<br>Sign in to buy, sell & discover fresh produce.</p>

            <!-- Google Sign In -->
            <button class="social-btn google-btn" id="googleSignIn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>

            <div class="login-divider">or</div>

            <!-- GitHub Sign In -->
            <button class="social-btn github-btn" id="githubSignIn">
                <i class="bi bi-github" style="font-size: 1.3rem;"></i>
                Continue with GitHub
            </button>

            <!-- Terms -->
            <div class="mt-3" style="font-size: 0.75rem; color: var(--fg-text-muted);">
                By signing in, you agree to our
                <a href="#">Terms of Service</a> and
                <a href="#">Privacy Policy</a>.
            </div>

            <!-- Loading state -->
            <div id="loginSpinner" class="mt-3 d-none">
                <div class="spinner-border spinner-border-sm text-success" role="status">
                    <span class="visually-hidden">Signing in...</span>
                </div>
                <span class="ms-2" style="font-size: 0.85rem; color: var(--fg-text-muted);">Signing you in...</span>
            </div>
        </div>
    </div>

    <!-- Firebase JS SDK (compat mode for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Fresh Greens Modules -->
    <script src="/assets/js/api.js"></script>
    <script src="/api/config/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            $(document).on('fg:auth:session_created', function () {
                window.location.href = '/index.html';
            });

            $(document).on('fg:auth:error', function (event, err) {
                _setLoading(false);
                FGToast.show('Sign-in failed: ' + (err && err.message ? err.message : 'Unknown error'), 'danger');
            });

            // If localStorage says logged in, verify with backend before redirecting
            if (FGAuth.isLoggedIn()) {
                FGAuth.checkSession()
                    .then(function (session) {
                        if (session) {
                            window.location.href = '/index.html';
                        } else {
                            // Stale localStorage — clear it
                            localStorage.removeItem('fg_user');
                        }
                    });
            }

            // Google Sign In
            $('#googleSignIn').on('click', function () {
                _setLoading(true);
                FGAuth.signInWithGoogle()
                    .then(function () {
                        // Popup flow redirects via fg:auth:session_created.
                        // Redirect fallback navigates away and returns to complete sign-in.
                    })
                    .catch(function (err) {
                        _setLoading(false);
                        const details = (err && (err.code || err.message))
                            ? (err.code ? err.code + ': ' : '') + (err.message || '')
                            : 'Unknown error';
                        FGToast.show('Google sign-in failed: ' + details, 'danger');
                    });
            });

            // GitHub Sign In
            $('#githubSignIn').on('click', function () {
                _setLoading(true);
                FGAuth.signInWithGitHub()
                    .then(function () {
                        // Popup flow redirects via fg:auth:session_created.
                        // Redirect fallback navigates away and returns to complete sign-in.
                    })
                    .catch(function (err) {
                        _setLoading(false);
                        const details = (err && (err.code || err.message))
                            ? (err.code ? err.code + ': ' : '') + (err.message || '')
                            : 'Unknown error';
                        FGToast.show('GitHub sign-in failed: ' + details, 'danger');
                    });
            });

            function _setLoading(show) {
                if (show) {
                    $('#googleSignIn, #githubSignIn').prop('disabled', true);
                    $('#loginSpinner').removeClass('d-none');
                } else {
                    $('#googleSignIn, #githubSignIn').prop('disabled', false);
                    $('#loginSpinner').addClass('d-none');
                }
            }
        });
    </script>
</body>
</html>
