<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
            <a href="/cart.html" class="nav-link position-relative" style="color: #fff !important;">
                    <i class="bi bi-cart3" style="font-size: 1.3rem;"></i>
                    <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle d-none" id="cartBadge">0</span>
        </a>
        </div>
    </nav>

    <div class="container page-section" style="max-width: 700px;">
        <h2 class="section-title"><i class="bi bi-lock me-2"></i>Checkout</h2>

        <!-- Delivery Address Form -->
        <div class="settings-card">
            <h5><i class="bi bi-truck"></i> Delivery Address</h5>
            <div class="mb-3">
                <label class="form-label">Full Address</label>
                <textarea class="form-control" id="deliveryAddress" rows="2" placeholder="House no., Street, Landmark..."></textarea>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control" id="checkoutCity" placeholder="City">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Pincode</label>
                    <input type="text" class="form-control" id="checkoutPincode" placeholder="Pincode" maxlength="6">
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="settings-card">
            <h5><i class="bi bi-receipt"></i> Order Summary</h5>
            <div id="checkoutItems">
                <div class="spinner-fg"><div class="spinner-border text-success"></div></div>
            </div>
            <hr>
            <div class="d-flex justify-content-between">
                <span class="fw-bold">Total</span>
                <span class="fw-bold" style="font-size: 1.3rem; color: var(--fg-green);" id="checkoutTotal">₹0</span>
            </div>
        </div>

        <!-- Pay Button -->
        <button class="btn btn-accent btn-lg w-100" id="payBtn">
            <i class="bi bi-shield-lock me-2"></i> Pay with Razorpay
        </button>
    </div>

    <!-- Razorpay Checkout.js -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/location.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();
            FGLocation.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            if (FGAuth.isLoggedIn()) {
                FGApi.get('/api/cart', { silent: true }).then(function (res) {
                    if (res.success && res.data.totalItems > 0) {
                        $('#cartBadge').text(res.data.totalItems).removeClass('d-none');
                    }
                }).catch(function () { /* ignore */ });
            }

            // Pre-fill location
            const loc = FGLocation.get();
            if (loc) {
                $('#checkoutCity').val(loc.city);
                $('#checkoutPincode').val(loc.pincode);
            }

            let cartData = null;

            // Load cart
            FGApi.get('/api/cart').then(function (res) {
                if (res.success && res.data.items && res.data.items.length > 0) {
                    cartData = res.data;
                    let html = '';
                    res.data.items.forEach(function (item) {
                        html += `<div class="d-flex justify-content-between align-items-center mb-2" style="font-size: 0.9rem;">
                            <span>${item.productTitle} × ${item.quantity}</span>
                            <span class="fw-bold">₹${item.totalPrice}</span>
                        </div>`;
                    });
                    $('#checkoutItems').html(html);
                    $('#checkoutTotal').text('₹' + res.data.totalAmount);
                } else {
                    window.location.href = '/cart.html';
                }
            });

            // Pay Button
            $('#payBtn').on('click', function () {
                const address = $('#deliveryAddress').val().trim();
                const city = $('#checkoutCity').val().trim();
                const pincode = $('#checkoutPincode').val().trim();

                if (!address || !city || !pincode) {
                    FGToast.show('Please fill in your delivery address.', 'warning');
                    return;
                }

                $(this).prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-2"></span>Processing...');

                // Step 1: Create order on backend (also creates Razorpay order)
                FGApi.post('/api/orders', {
                    deliveryAddress: address,
                    city: city,
                    pincode: pincode
                }).then(function (res) {
                    if (res.success) {
                        // Step 2: Get Razorpay key
                        FGApi.get('/api/orders/razorpay-key').then(function (keyRes) {
                            _openRazorpay(keyRes.data, res.data);
                        });
                    }
                }).catch(function () {
                    $('#payBtn').prop('disabled', false).html('<i class="bi bi-shield-lock me-2"></i> Pay with Razorpay');
                });
            });

            function _openRazorpay(key, order) {
                const user = FGAuth.getUser();
                const options = {
                    key: key,
                    amount: order.grandTotal * 100, // in paise
                    currency: "INR",
                    name: "Fresh Greens",
                    description: "Order #" + order.orderNumber,
                    order_id: order.razorpayOrderId,
                    prefill: {
                        name: user.displayName || '',
                        email: user.email || ''
                    },
                    theme: { color: "#2d6a4f" },
                    handler: function (response) {
                        // Step 3: Verify payment on backend
                        FGApi.post('/api/orders/verify-payment', {
                            razorpayOrderId: response.razorpay_order_id,
                            razorpayPaymentId: response.razorpay_payment_id,
                            razorpaySignature: response.razorpay_signature
                        }).then(function (verifyRes) {
                            if (verifyRes.success) {
                                FGToast.show('Payment successful! 🎉', 'success');
                                setTimeout(function () {
                                    window.location.href = '/orders.html';
                                }, 1500);
                            }
                        });
                    },
                    modal: {
                        ondismiss: function () {
                            $('#payBtn').prop('disabled', false).html('<i class="bi bi-shield-lock me-2"></i> Pay with Razorpay');
                            FGToast.show('Payment cancelled.', 'warning');
                        }
                    }
                };

                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function (response) {
                    FGToast.show('Payment failed: ' + response.error.description, 'danger');
                    $('#payBtn').prop('disabled', false).html('<i class="bi bi-shield-lock me-2"></i> Pay with Razorpay');
                });
                rzp.open();
            }
        });
    </script>
</body>
</html>
