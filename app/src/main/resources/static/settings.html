<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
        </div>
    </nav>

    <div class="container page-section" style="max-width: 650px;">
        <h2 class="section-title"><i class="bi bi-gear me-2"></i>Settings</h2>

        <!-- Profile Info -->
        <div class="settings-card">
            <h5><i class="bi bi-person-circle"></i> Profile Information</h5>
            <div class="mb-3">
                <label class="form-label">Display Name</label>
                <input type="text" class="form-control" id="displayName">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control" id="settingsCity">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Pincode</label>
                    <input type="text" class="form-control" id="settingsPincode" maxlength="6">
                </div>
            </div>
            <button class="btn btn-fg" id="saveProfileBtn">
                <i class="bi bi-check-lg me-1"></i> Save Profile
            </button>
        </div>

        <!-- Email Verification -->
        <div class="settings-card">
            <h5>
                <i class="bi bi-envelope"></i> Email Verification
                <span class="verification-badge" id="emailBadge"></span>
            </h5>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="emailInput" readonly>
            </div>
            <p class="text-muted" style="font-size: 0.85rem;">
                Email is verified through your Google/GitHub login provider.
            </p>
        </div>

        <!-- Phone Verification -->
        <div class="settings-card">
            <h5>
                <i class="bi bi-phone"></i> Phone Verification
                <span class="verification-badge" id="phoneBadge"></span>
            </h5>
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text">+91</span>
                    <input type="tel" class="form-control" id="phoneInput" placeholder="98765 43210" maxlength="10">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">OTP Code</label>
                <input type="text" class="form-control" id="phoneOtpInput" placeholder="Enter 6-digit OTP" maxlength="6">
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-fg-outline" id="sendPhoneOtpBtn">
                    <i class="bi bi-send me-1"></i> Send OTP
                </button>
                <button class="btn btn-fg" id="verifyPhoneBtn">
                    <i class="bi bi-check-circle me-1"></i> Verify OTP
                </button>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="settings-card" style="border-left: 4px solid #dc3545;">
            <h5 class="text-danger"><i class="bi bi-exclamation-triangle"></i> Danger Zone</h5>
            <p class="text-muted" style="font-size: 0.85rem;">
                Signing out will clear your current session.
            </p>
            <button class="btn btn-outline-danger" id="logoutBtn">
                <i class="bi bi-box-arrow-right me-1"></i> Sign Out
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/api/config/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            // Load user profile
            FGApi.get('/api/users/me').then(function (res) {
                if (res.success) {
                    const u = res.data;
                    $('#displayName').val(u.displayName);
                    $('#emailInput').val(u.email);
                    $('#phoneInput').val(_toLocalPhoneDigits(u.phone));
                    $('#settingsCity').val(u.city);
                    $('#settingsPincode').val(u.pincode);

                    _setBadge('#emailBadge', u.emailVerified);
                    _setBadge('#phoneBadge', u.phoneVerified);
                }
            });

            // Save profile
            $('#saveProfileBtn').on('click', function () {
                FGApi.put('/api/users/me', {
                    displayName: $('#displayName').val().trim(),
                    city: $('#settingsCity').val().trim(),
                    pincode: $('#settingsPincode').val().trim()
                }).then(function (res) {
                    if (res.success) FGToast.show('Profile updated!', 'success');
                });
            });

            // Send OTP
            $('#sendPhoneOtpBtn').on('click', function () {
                const phoneDigits = _toLocalPhoneDigits($('#phoneInput').val());
                if (!/^\d{10}$/.test(phoneDigits)) {
                    FGToast.show('Enter a valid 10-digit phone number.', 'warning');
                    return;
                }

                FGApi.post('/api/users/send-phone-otp', { phone: '+91' + phoneDigits })
                    .then(function (res) {
                        if (res.success) {
                            FGToast.show('OTP sent to your phone.', 'success');
                            $('#phoneOtpInput').focus();
                        }
                    });
            });

            // Verify phone with OTP
            $('#verifyPhoneBtn').on('click', function () {
                const phoneDigits = _toLocalPhoneDigits($('#phoneInput').val());
                const otpCode = $('#phoneOtpInput').val().trim();

                if (!/^\d{10}$/.test(phoneDigits)) {
                    FGToast.show('Enter a valid 10-digit phone number.', 'warning');
                    return;
                }
                if (!/^\d{4,8}$/.test(otpCode)) {
                    FGToast.show('Enter a valid OTP code.', 'warning');
                    return;
                }

                FGApi.post('/api/users/verify-phone', { phone: '+91' + phoneDigits, otpCode: otpCode })
                    .then(function (res) {
                        if (res.success) {
                            FGToast.show('Phone verified successfully!', 'success');
                            $('#phoneOtpInput').val('');
                            _setBadge('#phoneBadge', true);
                        }
                    });
            });

            // Logout
            $('#logoutBtn').on('click', function () {
                FGAuth.signOut().then(function () {
                    window.location.href = '/login.html';
                });
            });

            function _setBadge(selector, verified) {
                if (verified) {
                    $(selector).addClass('verified').removeClass('unverified')
                        .html('<i class="bi bi-check-circle-fill"></i> Verified');
                } else {
                    $(selector).addClass('unverified').removeClass('verified')
                        .html('<i class="bi bi-exclamation-circle"></i> Unverified');
                }
            }

            function _toLocalPhoneDigits(rawPhone) {
                const digits = String(rawPhone || '').replace(/\D/g, '');
                if (!digits) return '';

                // Convert stored E.164 (+91XXXXXXXXXX) to local 10-digit view
                if (digits.length === 12 && digits.startsWith('91')) {
                    return digits.slice(2);
                }
                // If extra digits exist, keep the last 10 for local input field
                if (digits.length > 10) {
                    return digits.slice(-10);
                }
                return digits;
            }
        });
    </script>
</body>
</html>
