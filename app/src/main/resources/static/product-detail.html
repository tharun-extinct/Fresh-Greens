<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
            <div class="d-flex align-items-center gap-2">
                <a href="/cart.html" class="nav-link position-relative" style="color: #fff !important;">
                    <i class="bi bi-cart3" style="font-size: 1.3rem;"></i>
                    <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle d-none" id="cartBadge">0</span>
                </a>
                <div id="authSection">
                    <a href="/login.html" class="btn btn-fg btn-sm">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Product Detail -->
    <div class="container page-section">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb" style="font-size: 0.85rem;">
                <li class="breadcrumb-item"><a href="/index.html">Home</a></li>
                <li class="breadcrumb-item active" id="breadcrumbTitle">Product</li>
            </ol>
        </nav>

        <div class="row g-4" id="productDetail">
            <!-- Populated dynamically -->
            <div class="spinner-fg"><div class="spinner-border text-success"></div></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-fg">
        <div class="container text-center">
            <p class="mb-0" style="font-size: 0.8rem;">© 2026 Fresh Greens. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            if (!productId) {
                window.location.href = '/index.html';
                return;
            }

            FGApi.get('/api/products/' + productId).then(function (res) {
                if (res.success) {
                    const p = res.data;
                    document.title = p.title + ' — Fresh Greens';
                    $('#breadcrumbTitle').text(p.title);

                    $('#productDetail').html(`
                        <div class="col-md-5">
                            <img src="${p.imageUrl || '/assets/images/products/default.jpg'}"
                                 class="img-fluid rounded-3 shadow-sm" alt="${p.title}"
                                 style="width: 100%; max-height: 400px; object-fit: cover;">
                        </div>
                        <div class="col-md-7">
                            <span class="badge bg-success mb-2">${p.categoryName || 'Fresh Produce'}</span>
                            <h2 class="fw-bold">${p.title}</h2>
                            <div class="d-flex align-items-baseline gap-2 mb-3">
                                <span style="font-size: 2rem; font-weight: 800; color: var(--fg-green);">₹${p.price}</span>
                                <span class="text-muted">/ ${p.unit}</span>
                            </div>
                            <p class="text-muted">${p.description || 'Fresh, locally sourced produce.'}</p>

                            <div class="mb-3" style="font-size: 0.9rem;">
                                <div class="mb-1"><i class="bi bi-geo-alt text-danger me-2"></i><strong>Location:</strong> ${p.city || 'India'}${p.pincode ? ' — ' + p.pincode : ''}</div>
                                <div class="mb-1"><i class="bi bi-person me-2"></i><strong>Seller:</strong> ${p.sellerName}</div>
                                <div class="mb-1"><i class="bi bi-box-seam me-2"></i><strong>Stock:</strong> ${p.stockQuantity > 0 ? p.stockQuantity + ' available' : '<span class="text-danger">Sold Out</span>'}</div>
                            </div>

                            ${p.stockQuantity > 0 && p.status === 'ACTIVE' ? `
                            <div class="d-flex align-items-center gap-3 mb-3">
                                <label class="form-label mb-0 fw-bold">Qty:</label>
                                <input type="number" id="qty" class="form-control" style="width: 80px;" value="1" min="1" max="${p.stockQuantity}">
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-fg btn-lg" id="addToCartBtn" data-id="${p.id}">
                                    <i class="bi bi-cart-plus me-2"></i>Add to Cart
                                </button>
                                <button class="btn btn-accent btn-lg" id="buyNowBtn" data-id="${p.id}">
                                    <i class="bi bi-lightning me-2"></i>Buy Now
                                </button>
                            </div>
                            ` : '<div class="alert alert-warning">This product is currently unavailable.</div>'}
                        </div>
                    `);
                }
            }).catch(function () {
                $('#productDetail').html('<div class="empty-state"><i class="bi bi-exclamation-triangle d-block"></i><h5>Product not found</h5></div>');
            });

            // Add to Cart
            $(document).on('click', '#addToCartBtn', function () {
                if (!FGAuth.isLoggedIn()) {
                    window.location.href = '/login.html';
                    return;
                }
                const id = $(this).data('id');
                const qty = parseInt($('#qty').val()) || 1;
                FGApi.post('/api/cart/items', { productId: id, quantity: qty })
                    .then(function (res) {
                        if (res.success) {
                            FGToast.show('Added to cart!', 'success');
                            $('#cartBadge').text(res.data.totalItems).removeClass('d-none');
                        }
                    });
            });

            // Buy Now — add to cart then go to checkout
            $(document).on('click', '#buyNowBtn', function () {
                if (!FGAuth.isLoggedIn()) {
                    window.location.href = '/login.html';
                    return;
                }
                const id = $(this).data('id');
                const qty = parseInt($('#qty').val()) || 1;
                FGApi.post('/api/cart/items', { productId: id, quantity: qty })
                    .then(function () {
                        window.location.href = '/checkout.html';
                    });
            });
        });
    </script>
</body>
</html>
