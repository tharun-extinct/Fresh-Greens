<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — Fresh Greens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-fg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/index.html"><span class="brand-icon">🥬</span> Fresh Greens</a>
        </div>
    </nav>

    <div class="container page-section" style="max-width: 800px;">
        <h2 class="section-title"><i class="bi bi-bag me-2"></i>My Orders</h2>

        <div id="ordersList">
            <div class="spinner-fg"><div class="spinner-border text-success"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/firebase-config.js"></script>
    <script src="/assets/js/auth.js"></script>

    <script>
        $(document).ready(function () {
            FGAuth.init();

            if (!FGAuth.isLoggedIn()) {
                window.location.href = '/login.html';
                return;
            }

            FGApi.get('/api/orders?page=0&size=20').then(function (res) {
                if (res.success) {
                    const orders = res.data.content || [];
                    if (!orders.length) {
                        $('#ordersList').html(`
                            <div class="empty-state">
                                <i class="bi bi-bag-x d-block"></i>
                                <h5>No orders yet</h5>
                                <p>Start shopping to see your orders here!</p>
                                <a href="/index.html" class="btn btn-fg mt-2">Browse Products</a>
                            </div>`);
                        return;
                    }

                    let html = '';
                    orders.forEach(function (order) {
                        const statusColors = {
                            CREATED: 'secondary', CONFIRMED: 'primary', PROCESSING: 'info',
                            SHIPPED: 'warning', DELIVERED: 'success', CANCELLED: 'danger'
                        };
                        const payColors = { PENDING: 'warning', PAID: 'success', FAILED: 'danger', REFUNDED: 'info' };

                        html += `
                            <div class="settings-card">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <div>
                                        <h6 class="mb-0 fw-bold">${order.orderNumber}</h6>
                                        <small class="text-muted">${new Date(order.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</small>
                                    </div>
                                    <div class="text-end">
                                        <span class="badge bg-${statusColors[order.orderStatus] || 'secondary'}">${order.orderStatus}</span>
                                        <span class="badge bg-${payColors[order.paymentStatus] || 'secondary'}">${order.paymentStatus}</span>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="text-muted" style="font-size: 0.85rem;">
                                        <i class="bi bi-geo-alt me-1"></i>${order.city}${order.pincode ? ' — ' + order.pincode : ''}
                                    </span>
                                    <span class="fw-bold" style="color: var(--fg-green); font-size: 1.15rem;">₹${order.grandTotal}</span>
                                </div>
                            </div>`;
                    });
                    $('#ordersList').html(html);
                }
            });
        });
    </script>
</body>
</html>
